# Stage 1: Train the independent velocity field v_ind,θ following ELF's training recipe.
# Ref: "Embedded Language Flows" (Hu et al. 2026, arXiv:2605.10938)
# Stage 1 of "Correlation Flow Matching for LLM".
# After Stage 1, freeze θ and proceed to Stage 2 (train the correlation network φ_η).

# Dataset
data_path: "embedded-language-flows/openwebtext-t5"
max_length: 1024

# Encoder
encoder_model_name: t5-small
encoder_checkpoint: "embedded-language-flows/t5_small_encoder_jax/t5_small_encoder_jax.pkl"
latent_mean: 0.0
latent_std: 0.2

# Model architecture (independent velocity field — same backbone as ELF-B)
model: ELF-B
bottleneck_dim: 128
num_time_tokens: 4
num_self_cond_cfg_tokens: 4
num_model_mode_tokens: 4

# GP path (used in Stage 2; defined here so Stage 2 config can inherit these values)
gp_q: 2           # context window: token i conditions on the previous gp_q tokens
gp_rho: 0.5       # adjacent-token correlation
gp_kernel: rbf    # rbf: K(i,j)=gp_rho^(|i-j|^2), non-Markov so gp_q>1 is meaningful

# Denoiser objective (flow matching: L_ind = ||v_ind,θ(z_t, t) - v_lin||²)
# Uses logit-normal time sampling and x-prediction (denoiser) parameterization.
denoiser_p_mean: -1.5
denoiser_p_std: 0.8
denoiser_noise_scale: 2.0
t_eps: 0.05
time_schedule: "logit_normal"

# Decoder objective (ELF: jointly train a CE token-prediction head at t=1)
decoder_prob: 0.2
decoder_noise_scale: 5.0
decoder_p_mean: 0.8
decoder_p_std: 0.8

# Self-conditioning (ELF: predict x_0 estimate, feed back as additional input)
self_cond_prob: 0.5

# Training
epochs: 5
global_batch_size: 512
blr: 0.001
weight_decay: 0.0
warmup_epochs: 0.5
warmup_steps: -1
optimizer: muon

# EMA
ema_decay1: 0.9999

# Sampling
sampling_configs_path: "configs/sampling_configs/uncond_sampling_configs.yml"
num_samples: 1000

# Logging & Checkpointing
log_freq: 100
save_freq: 1
eval_freq: 1

# Output
output_dir: "outputs/corrflow_stage1-owt"
hf_repo_id: null
resume: null

# Wandb
use_wandb: true
wandb_project: corrflow
wandb_entity: null
wandb_run_name: corrflow_stage1-owt

# Misc
seed: 42
