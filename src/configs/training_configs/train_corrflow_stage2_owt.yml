# Stage 2: Train the correlation network φ_η with the Stage 1 backbone frozen.
# Ref: "Correlation Flow Matching for LLM" (CorrFlow, ICLR 2026)
#
# The backbone (theta) is loaded from backbone_checkpoint and held frozen.
# Only phi_eta (CorrNetwork) is trained to match the GP-path velocity target:
#
#   v_con^i = v_ind^i + phi_eta(sg[v_ind], t)
#   L_con   = E[ mean_i ||v_con^i - v_gp^i||^2 ]
#
# Run:
#   cd src
#   python train_stage2.py --config configs/training_configs/train_corrflow_stage2_owt.yml

# Dataset (local, pre-encoded; downloaded from embedded-language-flows HF org)
data_path: "/home.na1/ad.wsu.edu/khiem.tran/pvt/data/openwebtext-t5"
eval_data_path: null   # OWT has no separate validation split
max_length: 1024
pad_token: eos

# Encoder (same as Stage 1 — frozen)
encoder_model_name: t5-small
encoder_checkpoint: "embedded-language-flows/t5_small_encoder_jax/t5_small_encoder_jax.pkl"
latent_mean: 0.0
latent_std: 0.2

# Backbone architecture — must match the Stage 1 checkpoint exactly
model: ELF-B
bottleneck_dim: 128
num_time_tokens: 4
num_self_cond_cfg_tokens: 4
num_model_mode_tokens: 4

# Frozen backbone: official ELF-B-owt pre-trained checkpoint (orbax ocdbt format).
# train_stage2.py detects the format automatically and loads via orbax.
backbone_checkpoint: "/home.na1/ad.wsu.edu/khiem.tran/pvt/checkpoints/ELF-B-owt"

# GP path — tune gp_rho / gp_q to control inter-token correlation
gp_q: 4
gp_rho: 3.0
gp_kernel: content

# CorrNetwork φ_η architecture
corr_model: CorrNet-XL  # h=512, 2L ~2M params

# Denoiser time schedule (Stage 2 uses same sampling as Stage 1 for z_gp)
denoiser_p_mean: -1.5
denoiser_p_std: 0.8
denoiser_noise_scale: 2.0
t_eps: 0.05
time_schedule: "logit_normal"

# Backbone self-conditioning (must match ELF-B-owt training settings)
self_cond_prob: 0.5
label_drop_prob: 0.0

# Training
epochs: 5
max_steps: 15000
global_batch_size: 256
generation_batch_size: 64
blr: 0.0005
weight_decay: 0.0
warmup_steps: 500
warmup_epochs: -1
optimizer: muon

# EMA
ema_decay1: 0.9999

# Sampling (evaluation uses the full composed model v_con = v_ind + delta_v)
sampling_configs_path: "configs/sampling_configs/uncond_sampling_configs.yml"
num_samples: 1000

# PPL / Entropy evaluation (unconditional — no reference text needed)
online_eval: true
eval_ppl_model: "gpt2-large"
eval_ppl_batch_size: 32
eval_ppl_max_length: 1024

# Logging & Checkpointing
log_freq: 100
save_freq: 1
eval_freq: 1

# Output
output_dir: "outputs/corrflow_stage2-owt"
hf_repo_id: null
resume: null

# Wandb
use_wandb: true
wandb_project: corrflow
wandb_entity: null
wandb_run_name: corrflow_stage2-owt

# Misc
seed: 42
