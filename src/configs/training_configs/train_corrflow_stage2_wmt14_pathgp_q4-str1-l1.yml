# Stage 2: WMT14 De-En, path-GP correlation, q=4, strength=1.0, lengthscale=1.0
# Tests the deterministic path-GP (build_gp_path_correlation_at_t + jax.jvp velocity)
# vs noise-GP baseline (BLEU 26.16, rho=3.0, blr=1e-3).

data_path: "/home.na1/ad.wsu.edu/khiem.tran/pvt/data/wmt14_de-en_train_t5"
eval_data_path: "/home.na1/ad.wsu.edu/khiem.tran/pvt/data/wmt14_de-en_validation_t5"
max_length: 128
max_input_length: 64
pad_token: eos

encoder_model_name: t5-small
encoder_checkpoint: "embedded-language-flows/t5_small_encoder_jax/t5_small_encoder_jax.pkl"
latent_mean: 0.0
latent_std: 0.2

model: ELF-B
bottleneck_dim: 128
num_time_tokens: 4
num_self_cond_cfg_tokens: 4
num_model_mode_tokens: 4

backbone_checkpoint: "/home.na1/ad.wsu.edu/khiem.tran/pvt/checkpoints/ELF-B-de-en"

# Path-GP settings
use_path_gp: true
gp_q: 4
gp_path_strength: 1.0
gp_lengthscale: 1.0
gp_kernel: rbf
gp_obs_noise: 1.0
gp_jitter: 0.00001

corr_model: CorrNet-L

denoiser_p_mean: -1.5
denoiser_p_std: 0.8
denoiser_noise_scale: 2.0
t_eps: 0.05
time_schedule: "logit_normal"

self_cond_prob: 0.5
label_drop_prob: 0.1

epochs: 5
max_steps: 20000
global_batch_size: 512
blr: 0.001
weight_decay: 0.0
warmup_steps: 500
warmup_epochs: -1
optimizer: muon

ema_decay1: 0.9999

sampling_configs_path: "configs/sampling_configs/cond_sampling_configs.yml"
num_samples: 1000

online_eval: true
eval_ppl_model: null

log_freq: 100
save_freq: 1
eval_freq: 1

output_dir: "outputs/wmt14_stage2_pathgp-q4-str1-l1"
hf_repo_id: null
resume: null

use_wandb: true
wandb_project: corrflow
wandb_entity: null
wandb_run_name: wmt14_stage2_pathgp-q4-str1-l1

seed: 42
